{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <i class="fas fa-key fa-3x text-success mb-3"></i>
    <h4 class="fw-bold">Reset Password</h4>
    <p class="text-muted small">Enter the OTP sent to <strong class="text-primary">{{ email }}</strong> and your new password.</p>
</div>
<form method="POST">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="mb-3">
                        <label for="otp" class="form-label">OTP (Check Email)</label>
                        <input type="text" class="form-control text-center letter-spacing-2" id="otp" name="otp"
                            required maxlength="6" style="font-size: 1.2rem; letter-spacing: 5px;">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">New Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Reset Password</button>
</form>
{% endblock %}
