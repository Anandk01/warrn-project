{% extends 'admin/base.html' %}

{% block head %}
{{ super() }}
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    rel="stylesheet">

<!-- Custom Styles for Admin -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    /* Override Bootswatch/Bootstrap defaults in Admin */
    body {
        font-family: 'Inter', sans-serif !important;
        background-color: #f8fafc;
        background-image:
            radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.05) 0px, transparent 50%);
    }

    .navbar {
        background: white !important;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        border-bottom: 1px solid #e2e8f0;
        padding: 1rem !important;
    }

    .navbar-brand {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        color: #4f46e5 !important;
        font-size: 1.5rem;
    }

    .nav-link {
        color: #64748b !important;
        font-weight: 500;
    }

    .nav-link:hover,
    .nav-link.active {
        color: #4f46e5 !important;
    }

    .table {
        background: white;
        border-radius: 8px;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        overflow: hidden;
        margin-top: 20px;
    }

    .table thead th {
        background-color: #f1f5f9;
        border-bottom: 2px solid #e2e8f0;
        color: #475569;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 1rem;
        border-top: none;
    }

    .table td {
        vertical-align: middle;
        padding: 1rem;
        color: #334155;
        border-top: 1px solid #f1f5f9;
    }

    h1,
    h2,
    h3 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #1e293b;
        font-weight: 700;
    }

    /* Buttons */
    .btn {
        border-radius: 6px;
        font-weight: 500;
        text-transform: none;
    }

    .btn-primary {
        background-color: #4f46e5;
        border-color: #4f46e5;
    }

    .btn-primary:hover {
        background-color: #4338ca;
        border-color: #4338ca;
    }

    /* Action buttons in list view */
    .action-row a {
        padding: 5px 10px;
        border-radius: 4px;
        margin-right: 5px;
    }

    /* Filters */
    .filter-row {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border: 1px solid #e2e8f0;
    }

    /* Form Controls */
    .form-control {
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        padding: 0.6rem 1rem;
    }

    .form-control:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    /* Dropdowns */
    .select2-container .select2-selection--single {
        height: 38px;
        border-color: #cbd5e1;
        border-radius: 6px;
    }
</style>
{% endblock %}

{% block page_body %}
<div class="container-fluid" style="padding: 2rem;">
    {{ super() }}
</div>
{% endblock %}

{% block brand %}
<a class="navbar-brand" href="{{ admin_view.admin.url }}">
    <i class="fas fa-paw me-2"></i>WARRN Admin
</a>
{% endblock %}
