{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="text-center mb-4">
    <i class="fas fa-lock fa-3x text-primary mb-3"></i>
    <h4 class="fw-bold">Forgot Password?</h4>
    <p class="text-muted small">Enter your email to receive a One-Time Password (OTP) to reset your credentials.</p>
</div>
<form method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required
                            placeholder="name@example.com">
                    </div>
    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send OTP</button>
</form>
<div class="text-center mt-3">
    <a href="{{ url_for('login') }}" class="text-decoration-none small fw-bold">Back to Login</a>
</div>
{% endblock %}
