{% extends "base.html" %}
{% block title %}Verify Email - ResQtail{% endblock %}

{% block auth_content %}
<div class="text-center mb-4">
    <h4 class="fw-bold text-dark">Email Verification</h4>
    <p class="text-muted small">Please enter the 6-digit OTP sent to <strong>{{ email }}</strong></p>
</div>
<form method="POST" action="{{ url_for('verify_email') }}">
    <div class="mb-4">
        <label for="otp" class="form-label text-secondary fw-semibold">6-Digit Code</label>
        <input type="text" class="form-control form-control-lg text-center" style="letter-spacing:0.5em;font-size:1.5rem;" id="otp" name="otp" pattern="\d{6}" maxlength="6" required autocomplete="off" placeholder="••••••">
    </div>
    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Verify Account</button>
    </div>
</form>
<div class="text-center mt-4 border-top pt-3">
    <p class="text-muted small mb-0">Didn't receive the code? <a href="#" class="text-primary text-decoration-none fw-semibold">Check Spam</a></p>
</div>
{% endblock %}
